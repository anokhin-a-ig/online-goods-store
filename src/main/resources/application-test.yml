spring:
  application:
    name: Online Goods Store
    group: ru.anokhin.dev
    version: 0.0.1

  liquibase:
    enabled: false

  datasource:
    url: jdbc:h2:mem:test
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create-drop

server:
  address: localhost
  port: 8083
  servlet:
    context-path: /online-goods-store
    encoding:
      charset: UTF-8
      enabled: true