spring:
  application:
    name: Online Goods Store
    group: ru.anokhin.dev
    version: 0.0.1

  liquibase:
    enabled: false


  datasource:
    url: jdbc:h2:~/db/mydb
#    url: jdbc:h2:file:./data/mydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  h2:
    console:
      enabled: true
      path: /h2-console


server:
  address: localhost
  port: 8081
  servlet:
    context-path: /online-goods-store
    encoding:
      charset: UTF-8
      enabled: true


