spring:
  application:
    name: Online Goods Store
    group: ru.anokhin.dev
    version: 0.0.1

  liquibase:
    enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/STORE
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    database: STORE
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE



server:
  address: localhost
  port: 8082
  servlet:
    context-path: /online-goods-store
    encoding:
      charset: UTF-8
      enabled: true